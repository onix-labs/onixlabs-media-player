name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: actions/cache@v4
        id: deps
        with:
          path: node_modules
          key: node-modules-${{ matrix.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build application
        run: npm run build:all

      - name: Obfuscate code
        run: npm run obfuscate

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: electron-builder --${{ matrix.platform }} --publish always
