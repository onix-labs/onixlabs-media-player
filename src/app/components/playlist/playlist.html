<div class="playlist-container" [class.hidden]="!isVisible()">
  <div class="playlist-header">
    <span class="playlist-title">Playlist</span>
    <span class="playlist-count">{{ count() }} items</span>
    <button class="close-btn" (click)="hide()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="playlist-items">
    @for (item of items(); track item.id) {
      <div
        class="playlist-item"
        [class.active]="isCurrentItem(item)"
        (click)="selectItem(item)"
      >
        <div class="item-icon">
          <i [class]="item.type === 'audio' ? 'fa-solid fa-music' : 'fa-solid fa-film'"></i>
        </div>
        <div class="item-info">
          <span class="item-title">{{ item.title }}</span>
          @if (item.artist) {
            <span class="item-artist">{{ item.artist }}</span>
          }
        </div>
        <span class="item-duration">{{ formatDuration(item.duration) }}</span>
        <button class="remove-btn" (click)="removeItem($event, item)">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    }

    @if (items().length === 0) {
      <div class="empty-state">
        <i class="fa-solid fa-music fa-2x"></i>
        <p>No items in playlist</p>
        <p class="hint">Click eject to add media files</p>
      </div>
    }
  </div>
</div>
