<div class="seek-bar-container">
  <span class="time-display current">{{ currentTime() }}</span>
  <progress [value]="progress()" max="100" (click)="onProgressClick($event)"></progress>
  <span class="time-display total">{{ totalDuration() }}</span>
</div>
<div class="control-groups-container">
  <div class="control-group left">
    <span class="media-title">{{ trackTitle() }}</span>
  </div>
  <div class="control-group center">
    <div class="button-group left">
      <button (click)="onEject()" title="Open files">
        <i class="fa-solid fa-eject"></i>
      </button>
      <button (click)="onShuffle()" [disabled]="!hasTrack()" [class.active]="isShuffleEnabled()" title="Shuffle">
        <i class="fa-solid fa-shuffle"></i>
      </button>
      <button (click)="onRepeat()" [disabled]="!hasTrack()" [class.active]="isRepeatEnabled()" title="Repeat">
        <i class="fa-solid fa-repeat"></i>
      </button>
    </div>
    <div class="button-group center">
      <button (click)="onBackward($event)" [disabled]="!hasTrack() || !canSkipBackward()" title="Previous (Shift: skip back)">
        <i [class]="backwardIcon()"></i>
      </button>
      <button (click)="onPlayPause()" [disabled]="!hasTrack()" title="Play/Pause">
        <i [class]="isPlaying() ? 'fa-solid fa-pause' : 'fa-solid fa-play'"></i>
      </button>
      <button (click)="onForward($event)" [disabled]="!hasTrack() || !canSkipForward()" title="Next (Shift: skip forward)">
        <i [class]="forwardIcon()"></i>
      </button>
    </div>
    <div class="button-group right">
      <button (click)="onMuteToggle()" [class.muted]="isMuted()" title="Mute/Unmute">
        <i [class]="isMuted()
      ? 'fa-solid fa-volume-xmark'
      : (volume() < 50 ? 'fa-solid fa-volume-low'
      : 'fa-solid fa-volume-high')"></i>
      </button>
      <div class="volume-container">
        <input
          type="range"
          min="0"
          max="100"
          [value]="volume()"
          (input)="onVolumeChange($event)"
        />
      </div>
    </div>
  </div>
  <div class="control-group right">
    <div class="button-group left">
      <button (click)="onToggleFullscreen()" [disabled]="!hasTrack()" [title]="isFullscreen() ? 'Exit fullscreen' : 'Enter fullscreen'">
        <i [class]="isFullscreen() ? 'fa-solid fa-compress' : 'fa-solid fa-expand'"></i>
      </button>
      <button (click)="onEnterMiniplayer()" [disabled]="!hasTrack()" title="Enter miniplayer">
        <i class="fa-solid fa-down-left-and-up-right-to-center"></i>
      </button>
    </div>
  </div>
</div>
