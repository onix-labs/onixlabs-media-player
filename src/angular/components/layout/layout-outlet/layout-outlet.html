<div class="container">
  <div class="content-area">
    <div class="media-area">
      @if (isAudio()) {
        <app-audio-outlet #audioOutlet/>
      } @else if (isVideo()) {
        <app-video-outlet/>
      } @else {
        <div class="idle-state"
             [class.drag-over]="isDragOver()"
             (dragover)="onDragOver($event)"
             (dragleave)="onDragLeave($event)"
             (drop)="onDrop($event)">
          <img alt="ONIXPlayer" src="logo.png"/>
          <p>No media loaded</p>
          <p class="hint">Drag files here or click eject to add media</p>
        </div>
      }
    </div>
    @if (!isFullscreen() && !isMiniplayer()) {
      <app-playlist/>
    }
  </div>

  @if (!isFullscreen() && !isMiniplayer()) {
    <div class="media-bar">
      @if (isAudio()) {
        <button (click)="previousVisualization()" title="Previous visualization">
          <i class="fa-solid fa-caret-left"></i>
        </button>
        <button (click)="nextVisualization()" title="Next visualization">
          <i class="fa-solid fa-caret-right"></i>
        </button>
        <span class="visualization-name">{{ visualizationName() }}</span>
      }
      <div class="spacer"></div>
      <button class="playlist-toggle" (click)="togglePlaylist()" title="Toggle playlist">
        <i class="fa-solid fa-list"></i>
      </button>
    </div>
  }
</div>
