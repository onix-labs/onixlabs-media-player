@if (isConfigurationWindow) {
  <!-- Standalone configuration window -->
  <app-configuration-view [isStandaloneWindow]="true"/>
} @else if (isAboutWindow) {
  <!-- Standalone about window -->
  <app-about-view/>
} @else if (isSetupWizardWindow) {
  <!-- Setup wizard window -->
  <app-setup-wizard/>
} @else {
  <!-- Main application window -->
  @if (isHelpMode()) {
    <app-help-topics-view/>
  }
  @if (isMiniplayer()) {
    <div class="miniplayer-container"
         [class.hidden]="isHelpMode()"
         (mouseenter)="onMiniplayerMouseEnter()"
         (mouseleave)="onMiniplayerMouseLeave()">
      <app-layout-outlet class="miniplayer-content" (openDependencySettings)="onOpenDependencySettings()"/>
      <app-miniplayer-controls class="miniplayer-overlay" [class.controls-visible]="showControls()"/>
    </div>
  } @else {
    <div class="media-player-view" [class.hidden]="isHelpMode()">
      @if (!isFullscreen() && isMacOS()) {
        <app-layout-header/>
      }
      <app-layout-outlet (openDependencySettings)="onOpenDependencySettings()"/>
      @if (!isFullscreen() || showControls()) {
        <app-layout-controls [class.fullscreen-overlay]="isFullscreen()"/>
      }
    </div>
  }
}
