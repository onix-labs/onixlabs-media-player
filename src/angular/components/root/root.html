@if (isConfigurationMode()) {
  <app-configuration-view (close)="exitConfigurationMode()"/>
}
<div class="media-player-view" [class.hidden]="isConfigurationMode()">
  @if (!isFullscreen()) {
    <app-layout-header/>
  }
  <app-layout-outlet/>
  @if (!isFullscreen() || showControls()) {
    <app-layout-controls [class.fullscreen-overlay]="isFullscreen()"/>
  }
</div>
